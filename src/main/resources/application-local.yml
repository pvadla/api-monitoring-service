# Local environment profile: activate with spring.profiles.active=local

spring:
  datasource:
    url: jdbc:h2:mem:apiwatch
    driver-class-name: org.h2.Driver
    username: sa
    password: ""
  config:
    import: optional:file:.env[.properties]
  security:
    oauth2:
      client:
        registration:
          google:
            client-id: ${GOOGLE_CLIENT_ID}
            client-secret: ${GOOGLE_CLIENT_SECRET}
  jpa:
    hibernate:
      ddl-auto: create-drop
    show-sql: true
    database-platform: org.hibernate.dialect.H2Dialect
    properties:
      hibernate:
        dialect: org.hibernate.dialect.H2Dialect
        format_sql: true

  h2: 
   console:
    enabled: true
    path: /h2-console
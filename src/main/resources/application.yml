# Production defaults. For local development use: spring.profiles.active=local

spring:
  application:
    name: APIMonitoring

  # Production datasource (set SPRING_DATASOURCE_* env vars in deployment)
  datasource:
    url: ${JDBC_DATABASE_URL}
    username: ${PGUSER}
    password: ${PGPASSWORD}

  # JPA / Hibernate for production
  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false

server:
  port: ${PORT:8080}
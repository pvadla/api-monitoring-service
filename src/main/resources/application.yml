spring:
  application:
    name: APIMonitoring
  config:
    import: optional:file:.env[.properties]

  datasource:
    # Railway gives postgresql:// but Spring needs jdbc:postgresql://
    #url: jdbc:postgresql://yamanote.proxy.rlwy.net:39474/railway
    url: jdbc:postgresql://postgres.railway.internal:5432/railway
    #postgresql://postgres:TpsmPQKyOZcoVnJCioNVZkrjyquyJhzi@postgres.railway.internal:5432/railway
    username: postgres
    password: TpsmPQKyOZcoVnJCioNVZkrjyquyJhzi
    driver-class-name: org.postgresql.Driver
    hikari:
      connection-timeout: 20000
      maximum-pool-size: 5

  jpa:
    hibernate:
      ddl-auto: update        # use 'update' not 'validate' until schema exists
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: false
   # ─── Google OAuth2 ───
  security:
    oauth2:
      client:
        registration:
          google:
            client-id: 349917838053-f72t2gm1ea9ioi4te8841tnjq8n0srgo.apps.googleusercontent.com
            client-secret: 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
            scope:
              - email
              - profile
            redirect-uri: "{baseUrl}/login/oauth2/code/{registrationId}"
        provider:
          google:
            authorization-uri: https://accounts.google.com/o/oauth2/auth
            token-uri: https://oauth2.googleapis.com/token
            user-info-uri: https://www.googleapis.com/oauth2/v3/userinfo
            user-name-attribute: sub

server:
  port: ${PORT:8080}



logging:
  level:

server:
  port: ${PORT:8080}

spring:
  security:
    oauth2:
      client:
        registration:
          google:
            client-id: ${GOOGLE_CLIENT_ID:missing}
            client-secret: ${GOOGLE_CLIENT_SECRET:missing}

  datasource:
    url: ${SPRING_DATASOURCE_URL}
    username: ${SPRING_DATASOURCE_USERNAME}
    password: ${SPRING_DATASOURCE_PASSWORD}

apiwatch:
  app:
    base-url: ${APIWATCH_BASE_URL:https://apiwatch.app}
  mail:
    enabled: ${APIWATCH_MAIL_ENABLED:true}
    from: ${APIWATCH_MAIL_FROM:no-reply@apiwatch.app}
    SMTP2GO_API_KEY: ${SMTP2GO_API_KEY:missing}
  contact:
    to: ${APIWATCH_CONTACT_TO:support@apiwatch.app}

razorpay:
  key-id: ${RAZORPAY_KEY_ID:missing}
  key-secret: ${RAZORPAY_KEY_SECRET:missing}
  webhook-secret: ${RAZORPAY_WEBHOOK_SECRET:missing}
  starter-amount-paise: ${RAZORPAY_STARTER_AMOUNT_PAISE:58000}
  plan:
    starter: ${RAZORPAY_PLAN_STARTER:missing}
    pro: ${RAZORPAY_PLAN_PRO:missing}

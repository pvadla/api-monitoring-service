spring:
  security:
    oauth2:
      client:
        registration:
          google:
            client-id: ${GOOGLE_CLIENT_ID:missing}
            client-secret: ${GOOGLE_CLIENT_SECRET:missing}

  datasource:
    url: jdbc:postgresql://postgres.railway.internal:5432/railway
    username: ${PGUSER:postgres}
    password: ${PGPASSWORD}
<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" xmlns:sec="http://www.thymeleaf.org/extras/spring-security"
      th:replace="~{fragments/layout :: html('Contact - APIWatch', ~{::#page-content}, ~{})}">
<body>
<div id="page-content">
<main class="max-w-3xl mx-auto px-6 pt-28 pb-16">
    <h1 class="text-3xl font-bold text-gray-900 mb-2">Contact us</h1>
    <p class="text-gray-500 mb-6">
        Have a question about APIWatch, billing, or feature requests? Send us a message and we’ll get back to you.
    </p>

    <div th:if="${success}" class="mb-6 bg-green-50 border border-green-200 text-green-700 px-4 py-3 rounded-lg">
        <span th:text="${success}">Thanks for your message.</span>
    </div>

    <div class="bg-white rounded-xl shadow-sm border border-gray-100 p-6">
        <form th:action="@{/contact}" method="post" class="space-y-5">
            <div>
                <label class="block text-sm font-medium text-gray-700 mb-1">Name</label>
                <input type="text" name="name" required
                       class="w-full border border-gray-300 rounded-lg px-4 py-2 focus:ring-2 focus:ring-blue-500 focus:border-blue-500"
                       placeholder="Your name" />
            </div>
            <div>
                <label class="block text-sm font-medium text-gray-700 mb-1">Email</label>
                <input type="email" name="email" required
                       class="w-full border border-gray-300 rounded-lg px-4 py-2 focus:ring-2 focus:ring-blue-500 focus:border-blue-500"
                       placeholder="you@example.com" />
            </div>
            <div>
                <label class="block text-sm font-medium text-gray-700 mb-1">Subject (optional)</label>
                <input type="text" name="subject"
                       class="w-full border border-gray-300 rounded-lg px-4 py-2 focus:ring-2 focus:ring-blue-500 focus:border-blue-500"
                       placeholder="How can we help?" />
            </div>
            <div>
                <label class="block text-sm font-medium text-gray-700 mb-1">Message</label>
                <textarea name="message" rows="5" required
                          class="w-full border border-gray-300 rounded-lg px-4 py-2 focus:ring-2 focus:ring-blue-500 focus:border-blue-500"
                          placeholder="Tell us about your question or idea..."></textarea>
            </div>
            <button type="submit"
                    class="bg-blue-600 text-white px-5 py-2 rounded-lg hover:bg-blue-700 font-medium">
                Send message
            </button>
        </form>
    </div>
</main>
</div>
</body>
</html>
